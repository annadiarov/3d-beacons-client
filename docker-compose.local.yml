version: "3"
services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    command: uv run uvicorn bio3dbeacons.api.main:app --host 0.0.0.0
    ports:
      - 8000:8000
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail localhost:8000/health-check || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
    environment:
      - PROVIDER=$PROVIDER
      - MONGO_USERNAME=${MONGO_USERNAME:?}
      - MONGO_PASSWORD=${MONGO_PASSWORD:?}
      - MONGO_DB_HOST=mongodb:27017

  cli:
    container_name: cli-local
    build:
      context: .
      dockerfile: docker/cli/Dockerfile
    env_file:
      - .env.test
    volumes:
      - ./data:/app/data
      - ./bio3dbeacons:/app/bio3dbeacons
      - ./tests:/app/tests
      - ./resources:/app/resources
      - ./Snakefile:/app/Snakefile
    entrypoint: "tail -F anything"

  mongodb:
    image: mongo:latest
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:?}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?}
      - ASSETS_URL=test/static
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb

  nginx-proxy:
    build: docker/nginx
    restart: always
    ports:
      - 80:80
    volumes:
      - ./docker/nginx/default.conf:/tmp/default.conf
      - ./data:/var/www/static
    environment:
      - API_SERVER_ADDR=web:8000
    depends_on:
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail localhost:80/health-check || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
    command: /app/start.sh

volumes:
  mongodb-data:
  mongodb-config:
