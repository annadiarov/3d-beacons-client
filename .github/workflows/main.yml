name: Run tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
          MONGO_INITDB_DATABASE: models
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run tests
        run: make test
        env:
          MONGO_USERNAME: test
          MONGO_PASSWORD: test
          PROVIDER: test
          MONGO_DB_HOST: localhost:27017
          MODEL_FORMAT: MMCIF
          ASSETS_URL: localhost/static
          LOG_LEVEL: DEBUG
          GEMMI_BIN: /usr/share/miniconda/bin/gemmi
